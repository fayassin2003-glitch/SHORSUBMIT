<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="navbar"></header>
  <main class="page narrow">
    <section class="panel">
      <h1>הרשמה</h1>
      <form id="registerForm" class="form">
        <label>שם מלא <input name="name" required></label>
        <label>תעודת זהות <input name="identity" required minlength="5"></label>
        <label>אימייל <input name="email" type="email" required></label>
        <label>סיסמה <input name="password" type="password" required minlength="4"></label>
        <label>סוג משתמש
          <select name="role" required>
            <option value="student">סטודנט</option>
            <option value="teacher">מורה</option>
          </select>
        </label>
        <button class="btn primary" type="submit">צור חשבון</button>
      </form>
      <div id="message"></div>
    </section>
  </main>
  <script type="module" src="js/app/register.js"></script>
</body>
</html>
